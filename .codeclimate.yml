version: "2"

checks:
  method-complexity:
    enabled: true
    config:
      threshold: 20

  file-lines:
    enabled: true
    config:
      threshold: 500

  method-lines:
    enabled: true
    config:
      threshold: 100

  method-count:
    enabled: true
    config:
      threshold: 30

  return-statements:
    enabled: true
    config:
      threshold: 8

  argument-count:
    enabled: true
    config:
      threshold: 8

  identical-code:
    enabled: true
    config:
      threshold: 3

  similar-code:
    enabled: true
    config:
      threshold: 3

plugins:
  radon:
    enabled: true
    config:
      threshold: "C"

  duplication:
    enabled: true
    config:
      languages:
        python:
          mass_threshold: 40

exclude_patterns:
  - "**/__pycache__/"
  - "*.egg-info/"
  - "tests/"
  - "docs/"
  - ".claude/"
