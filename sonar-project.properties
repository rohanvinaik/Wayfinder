sonar.projectKey=rohanvinaik_Wayfinder
sonar.organization=rohanvinaik

sonar.projectName=Wayfinder
sonar.projectVersion=0.1.0

# Source layout
sonar.sources=src/,scripts/
sonar.tests=tests/
sonar.python.version=3.11

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/.claude/**,\
  **/.lintgate/**,\
  **/__pycache__/**,\
  **/*.md,\
  _site/**,\
  configs/**,\
  data/**

# Don't flag test files for duplication or complexity
sonar.cpd.exclusions=tests/**

# Coverage exclusions — modules that require torch, Lean server, Mathlib data,
# or heavy external setup and cannot be unit-tested in CI.
# Rationale: these are integration-tested locally with GPU/Lean available.
sonar.coverage.exclusions=\
  tests/**,\
  scripts/**,\
  src/encoder.py,\
  src/evaluate.py,\
  src/proof_navigator.py,\
  src/proof_network.py,\
  src/trainer.py,\
  src/trainer_checks.py,\
  src/trainer_setup.py,\
  src/trainer_steps.py,\
  src/trainer_validation.py,\
  src/losses.py,\
  src/data.py

# Treat these as test sources
sonar.test.inclusions=tests/**/*.py
