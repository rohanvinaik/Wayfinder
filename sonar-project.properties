sonar.projectKey=rohanvinaik_Wayfinder
sonar.organization=rohanvinaik

sonar.projectName=Wayfinder
sonar.projectVersion=0.1.0

# Source layout
sonar.sources=src/,scripts/
sonar.tests=tests/
sonar.python.version=3.11

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/.claude/**,\
  **/.lintgate/**,\
  **/__pycache__/**,\
  **/*.md,\
  _site/**,\
  configs/**,\
  data/**

# Don't flag test files for duplication or complexity
sonar.cpd.exclusions=tests/**

# Coverage exclusions — scripts and modules that require external services
# (Lean server, Mathlib data, GPU) and cannot be unit-tested in CI
sonar.coverage.exclusions=\
  tests/**,\
  scripts/extract_proof_network.py,\
  scripts/build_nav_training_data.py,\
  scripts/train_navigator.py,\
  scripts/run_benchmark.py,\
  scripts/eval_retrieval.py,\
  scripts/eval_spreading.py,\
  scripts/anchor_gap_analysis.py,\
  src/lean_interface.py,\
  src/verification.py,\
  src/proof_auditor.py

# Treat these as test sources
sonar.test.inclusions=tests/**/*.py
